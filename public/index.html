<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Garden Shed Adventure: Overgrown Quest</title>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body>
  <main id="shell">
    <section id="gameWrap" aria-label="Garden Shed Adventure game">
      <canvas id="game" width="640" height="480"></canvas>
      <div id="dialog" hidden></div>
      <div id="toast" hidden></div>
    </section>

    <section id="hud" aria-label="Game status">
      <div class="hud-row">
        <div id="hearts" aria-label="Health"></div>
        <div id="mission"></div>
      </div>
      <div class="hud-row compact">
        <div id="tools"></div>
        <div id="bag"></div>
      </div>
    </section>

    <section id="controlsHint">
      <span>Move: WASD / arrows</span>
      <span>Use tool: J / Z</span>
      <span>Interact: E / Space</span>
      <span>Swap: Q / R</span>
      <span>Pause: Esc</span>
    </section>

    <section id="touchControls" aria-label="Touch controls">
      <div class="dpad">
        <button data-key="arrowup" aria-label="Move up">Up</button>
        <button data-key="arrowleft" aria-label="Move left">Left</button>
        <button data-key="arrowdown" aria-label="Move down">Down</button>
        <button data-key="arrowright" aria-label="Move right">Right</button>
      </div>
      <div class="actions">
        <button data-key="j" aria-label="Use selected tool">Use</button>
        <button data-key="e" aria-label="Interact">Talk</button>
        <button data-key="r" aria-label="Swap selected tool">Tool</button>
      </div>
    </section>
  </main>

  <script type="module" src="./src/game.js"></script>
</body>
</html>
